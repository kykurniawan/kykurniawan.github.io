<script>
    function back() {
        var prevUrl = document.referrer
        var baseUrl = 'https:\/\/rizkykurniawan.id\/'

        if (prevUrl == '') {
            window.location.href = baseUrl
        } else {
            if (prevUrl == window.location.href) {
                window.history.back()
            } else {
                var url = prevUrl.split('//')
                var protocol = url[0]
                var prevHost = protocol + '//' + url[1].split('/')[0] + '/'
                if (prevHost == baseUrl) {
                    window.history.back()
                } else {
                    window.location.href = baseUrl
                }
            }
        }
    }

    $(window).scroll(function () {
        var scrollTop = $(window).scrollTop();
        if (scrollTop > 50) {
            
            $('#actionbar').addClass('fixed-top')
            $('#actionbar .container .row').addClass('p-2')
            $('#actionbar .container .row div').addClass('rounded-35 shadow-sm')
        } else {
            
            $('#actionbar').removeClass('fixed-top')
            $('#actionbar .container .row').removeClass('p-2')
            $('#actionbar .container .row div').removeClass('rounded-35 shadow-sm')
        }
    });

</script>

<script defer>
    $('#actionbar-dropdown-button').on('click', function (e) {
        e.preventDefault()
        $('#actionbar-dropdown').toggleClass('show')
    })
    function setBodyPadding() {
        $('body').css('padding-bottom', ($('#bottom-navigation').css('height') ? $('#bottom-navigation').css('height') : 0))
    }

    $(document).ready(function () {
        setBodyPadding()
    })

    $(window).scroll(function () {
        setBodyPadding()
    })

    $(window).on('resize', function () {
        setBodyPadding()
    })

    function clearInput(id, focus = false) {
        document.getElementById(id).value = ''
        if (focus) {
            document.getElementById(id).focus()
        }
    }

    function showSearchModal() {
        var searcModal = new bootstrap.Modal(document.getElementById('searchModal'), {
            keyboard: false
        })
        searcModal.show()
    }

    $.fn.moveIt = function () {
        var $window = $(window);
        var instances = [];

        $(this).each(function () {
            instances.push(new moveItItem($(this)));
        });

        window.addEventListener('scroll', function () {
            var scrollTop = $window.scrollTop();
            instances.forEach(function (inst) {
                inst.update(scrollTop);
            });
        }, { passive: true });
    }

    var moveItItem = function (el) {
        this.el = $(el);
        this.speed = parseInt(this.el.attr('data-scroll-speed'));
    };

    moveItItem.prototype.update = function (scrollTop) {
        this.el.css('transform', 'translateY(' + (scrollTop / this.speed) + 'px)');
    }
    
    $(function () {
        $('[data-scroll-speed]').moveIt();
    });
</script></body>
